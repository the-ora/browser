# Updates the Homebrew cask in the-ora/homebrew-ora when a new release is published.
#
# Required secrets:
#   HOMEBREW_PAT — A GitHub Personal Access Token (classic) with `repo` scope,
#                  authorized to push to the-ora/homebrew-ora.
#                  Generate at: https://github.com/settings/tokens
#
name: Update Homebrew Cask

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 0.2.12; omit "v" prefix)'
        required: false
        type: string
        default: ''
      dmg_url:
        description: 'Full DMG download URL (e.g., https://github.com/the-ora/browser/releases/download/v0.2.12/Ora-Browser-0.2.12.dmg)'
        required: false
        type: string
        default: ''

jobs:
  update-cask:
    runs-on: ubuntu-latest
    steps:
      - name: Validate token
        env:
          TOKEN: ${{ secrets.HOMEBREW_PAT }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::HOMEBREW_PAT secret is not set. A GitHub PAT with 'repo' scope is required to push to the-ora/homebrew-ora."
            exit 1
          fi

      - name: Checkout homebrew-ora repo
        uses: actions/checkout@v4
        with:
          repository: the-ora/homebrew-ora
          token: ${{ secrets.HOMEBREW_PAT }}
          ref: main

      - name: Resolve version and download URL
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          INPUT_DMG_URL: ${{ github.event.inputs.dmg_url }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
            DOWNLOAD_URL="$INPUT_DMG_URL"
            if [ -z "$VERSION" ] || [ -z "$DOWNLOAD_URL" ]; then
              echo "::error::Both 'version' and 'dmg_url' are required for manual dispatch."
              exit 1
            fi
          else
            VERSION="${RELEASE_TAG#v}"
            DOWNLOAD_URL="https://github.com/the-ora/browser/releases/download/${RELEASE_TAG}/Ora-Browser-${VERSION}.dmg"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "DOWNLOAD_URL=$DOWNLOAD_URL" >> "$GITHUB_ENV"
          echo "Resolved version: $VERSION"
          echo "Download URL: $DOWNLOAD_URL"

      - name: Download DMG
        run: |
          echo "Downloading DMG from $DOWNLOAD_URL ..."
          for attempt in 1 2 3; do
            if curl -L --fail -o Ora.dmg "$DOWNLOAD_URL"; then
              echo "Download succeeded (attempt $attempt)."
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::Failed to download DMG after 3 attempts. URL: $DOWNLOAD_URL"
              exit 1
            fi
            echo "Download failed (attempt $attempt), retrying in 15s..."
            sleep 15
          done

      - name: Compute SHA256
        run: |
          SHA256=$(shasum -a 256 Ora.dmg | awk '{print $1}')
          echo "SHA256=$SHA256" >> "$GITHUB_ENV"
          echo "SHA256: $SHA256"

      - name: Update ora.rb
        run: |
          sed -i "s|version \".*\"|version \"${VERSION}\"|g" Casks/ora.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|g" Casks/ora.rb
          echo "Updated Casks/ora.rb:"
          cat Casks/ora.rb

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/ora.rb
          if git diff --staged --quiet; then
            echo "No changes to commit — cask already at v${VERSION}."
          else
            git commit -m "Update Ora cask to v${VERSION}"
            git push
            echo "Pushed update to homebrew-ora."
          fi
