pre-commit:
  parallel: true
  commands:
    swiftformat:
      glob: "**/*.swift"
      run: swiftformat {staged_files} --quiet
      stage_fixed: true
    swiftlint:
      glob: "**/*.swift"
      run: swiftlint lint --fix --use-alternative-excluding {staged_files}
      stage_fixed: true

pre-push:
  commands:
    build:
      run: ./scripts/xcbuild-debug.sh
